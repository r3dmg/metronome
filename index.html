<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>metronome</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="%230077cc"/></svg>'>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Metronome</h1>
      <div id="totalTime">00:00</div>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-profile="0">1</button>
      <button class="tab" data-profile="1">2</button>
      <button class="tab" data-profile="2">3</button>
      <button class="tab" data-profile="3">4</button>
      <button class="tab" data-profile="4">5</button>
    </nav>

    <!-- Main Controls -->
    <section class="controls">
      <div class="control bpm">
        <label>BPM</label>
        <div class="input-group">
          <input id="bpmInput" type="number" value="120" min="20" max="300" />
          <input id="bpmRange" type="range" value="120" min="20" max="300" />
        </div>
      </div>
      <div class="control time-sig">
        <label>Time Signature</label>
        <div class="input-group">
          <select id="beatsPerBar">
            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
            <option value="4" selected>4</option><option value="5">5</option><option value="6">6</option>
            <option value="7">7</option><option value="8">8</option><option value="9">9</option>
            <option value="10">10</option><option value="11">11</option><option value="12">12</option>
          </select>
          <span>/</span>
          <select id="beatUnit">
            <option value="2">2</option><option value="4" selected>4</option><option value="8">8</option><option value="16">16</option>
          </select>
        </div>
      </div>
      <div class="control buttons">
        <button id="startBtn" class="btn primary">Start</button>
        <button id="stopBtn" class="btn secondary" disabled>Stop</button>
      </div>
    </section>

    <!-- Visualizer -->
    <section class="visualizer">
      <div class="progress">
        <div class="track">
          <div id="progressFill" class="fill"></div>
          <div id="bar" class="segments"></div>
        </div>
      </div>
      <div class="timer" id="nextStepTimer">—:—</div>
    </section>

    <!-- Options -->
    <section class="options">
      <label class="option">
        <input id="countToggle" type="checkbox" checked />
        <span>Countdown</span>
      </label>
      <label class="option">
        <input id="drumsToggle" type="checkbox" checked />
        <span>Drums</span>
      </label>
      <div class="option volume">
        <label for="drumsVol">Volume</label>
        <input id="drumsVol" type="range" min="0" max="1" step="0.01" value="0.8" />
      </div>
    </section>

    <!-- Auto-BPM -->
    <section class="auto-bpm" id="autoGroup">
      <h3>Auto-BPM</h3>
      <div class="auto-controls">
        <label class="toggle">
          <input id="autoBpmToggle" type="checkbox" />
          <span>Enable</span>
        </label>
        <label class="toggle">
          <input id="autoLoop" type="checkbox" checked />
          <span>Loop</span>
        </label>
        <label class="toggle">
          <input id="autoReverse" type="checkbox" />
          <span>Reverse</span>
        </label>
        <button id="autoResetBtn" class="btn small">Reset</button>
      </div>
      <div class="auto-inputs">
        <div class="input-row">
          <label for="autoMin">Min BPM</label>
          <input id="autoMin" type="number" min="20" max="300" value="100" />
        </div>
        <div class="input-row">
          <label for="autoMax">Max BPM</label>
          <input id="autoMax" type="number" min="20" max="300" value="140" />
        </div>
        <div class="input-row">
          <label for="autoStep">Step</label>
          <input id="autoStep" type="number" min="1" max="50" value="2" />
        </div>
        <div class="input-row">
          <label for="autoEvery">Every</label>
          <input id="autoEvery" type="number" min="1" max="256" value="4" />
          <select id="autoUnit">
            <option value="bars" selected>Bars</option>
            <option value="minutes">Minutes</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Countdown -->
    <div id="countdown">3</div>
  </div>

  <footer style="text-align: center; margin-top: 20px; color: var(--sub); font-size: 12px;">
    Inspired — accelonome.com
  </footer>

  <script src="script.js"></script>
</body>
</html>
